<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>InnovateIT School — O'qituvchilar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/oqituvchilar.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/hover.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">InnovateIT School · O'qituvchilar</div>
  <div class="topbar-right">
    <span class="admin-badge" id="admin-badge"></span>
    <span class="stat-badge"  id="total-count">0</span>
    <button class="btn-jadval"  id="btn-jadval-teacher"  onclick="openJadval()">📅 Dars jadvali</button>
    <button class="btn-davomat" id="btn-davomat-teacher" onclick="openDavomat()">📋 O'qituvchilar davomati</button>
    <button class="btn-logout"  onclick="goBack()">← Orqaga</button>
  </div>
</div>

<div class="main">

  <!-- ODDIY ADMIN: Qo'shish formasi -->
  <div class="form-card" id="add-form">
    <div class="card-title">➕ Yangi o'qituvchi qo'shish</div>
    <div class="form-grid">
      <div class="field-group">
        <label class="field-label">Ism</label>
        <input class="field-input" id="f-ism" placeholder="Nodira" autocomplete="off">
      </div>
      <div class="field-group">
        <label class="field-label">Familiya</label>
        <input class="field-input" id="f-familiya" placeholder="Yusupova" autocomplete="off">
      </div>
      <div class="field-group">
        <label class="field-label">Fan</label>
        <select class="field-input" id="f-fan">
          <option value="">— Tanlang —</option>
          <option value="Matematika">Matematika</option>
          <option value="Ingliz tili">Ingliz tili</option>
          <option value="IT">IT</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Telefon</label>
        <div class="tel-wrap">
          <input class="field-input tel-input" id="f-tel" placeholder="+998 __ ___ __ __" maxlength="17" inputmode="tel">
          <div class="tel-hint" id="f-tel-hint"></div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Qo'sh. telefon <span style="font-weight:400;text-transform:none;font-size:10px;">(ixtiyoriy)</span></label>
        <div class="tel-wrap">
          <input class="field-input tel-input" id="f-tel2" placeholder="+998 __ ___ __ __" maxlength="17" inputmode="tel">
          <div class="tel-hint" id="f-tel2-hint"></div>
        </div>
      </div>
    </div>
    <button class="btn-submit" id="submit-btn" onclick="addTeacher()">
      <span class="spinner" id="spinner"></span>
      <span id="btn-txt">Saqlash</span>
    </button>
  </div>

  <!-- SUPERADMIN: Yangi o'qituvchi tugmasi -->
  <div id="super-add-bar" style="display:none;margin-bottom:16px;">
    <button class="btn-submit" style="max-width:300px;" onclick="openSuperAdd()">
      ➕ Yangi o'qituvchi qo'shish
    </button>
  </div>

  <!-- JADVAL -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">O'qituvchilar ro'yxati</div>
      <input class="search-input" id="f-search" placeholder="🔍 Ism, fan…" oninput="applyFilter()">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>#</th>
          <th>Ism Familiya</th>
          <th>Fan</th>
          <th id="th-maktab" style="display:none;">Maktab</th>
          <th>Telefon</th>
          <th>Qo'sh. tel</th>
          <th id="th-amal">Amal</th>
        </tr></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
    <div class="mobile-list" id="mob-cards"></div>
  </div>

</div><!-- /main -->

<!-- MODAL: Oddiy admin tahrirlash -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">✏️ O'qituvchini tahrirlash</div>
    <div class="form-grid">
      <div class="field-group">
        <label class="field-label">Ism</label>
        <input class="field-input" id="e-ism">
      </div>
      <div class="field-group">
        <label class="field-label">Familiya</label>
        <input class="field-input" id="e-familiya">
      </div>
      <div class="field-group">
        <label class="field-label">Fan</label>
        <select class="field-input" id="e-fan">
          <option value="">— Tanlang —</option>
          <option value="Matematika">Matematika</option>
          <option value="Ingliz tili">Ingliz tili</option>
          <option value="IT">IT</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Telefon</label>
        <div class="tel-wrap">
          <input class="field-input tel-input" id="e-tel" maxlength="17" inputmode="tel">
          <div class="tel-hint" id="e-tel-hint"></div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Qo'sh. telefon</label>
        <div class="tel-wrap">
          <input class="field-input tel-input" id="e-tel2" maxlength="17" inputmode="tel">
          <div class="tel-hint" id="e-tel2-hint"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">Bekor</button>
      <button class="btn-submit" id="e-save-btn" onclick="saveEdit()">
        <span class="spinner" id="e-spinner"></span>
        <span id="e-btn-txt">Saqlash</span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL: Maktabga biriktirish -->
<div class="modal-overlay" id="assign-modal" onclick="if(event.target===this)closeAssign()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">🏫 Maktabga biriktirish</div>
    <div style="margin-bottom:16px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px;" id="assign-teacher-name"></div>
      <div style="font-size:12px;color:var(--muted);">
        Hozirgi maktab:
        <span style="font-weight:600;color:var(--text);" id="assign-current-maktab"></span>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Yangi maktab</label>
      <select class="field-input" id="assign-maktab-sel">
        <option value="">— Tanlang —</option>
      </select>
    </div>
    <div id="assign-err" style="display:none;color:#dc2626;font-size:13px;margin-top:8px;padding:8px 12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;"></div>
    <div class="modal-footer" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeAssign()">Bekor</button>
      <button class="btn-submit" id="assign-save-btn" onclick="saveAssign()">
        <span class="spinner" id="assign-spinner"></span>
        <span id="assign-btn-txt">Saqlash</span>
      </button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading-ov"><div class="loading-spinner"></div></div>
<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/oqituvchilar.js"></script>
<script src="js/mobile-nav.js"></script>
</body>
</html>
